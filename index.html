<!DOCTYPE html>
<html lang="es">
  <link rel="apple-touch-icon" id="apple-icon"/>
<script>
  // Genera el icono con canvas
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 512;
  const ctx = canvas.getContext('2d');

  // Fondo oscuro redondeado
  ctx.fillStyle = '#0b0e18';
  ctx.beginPath();
  ctx.roundRect(0, 0, 512, 512, 100);
  ctx.fill();

  // Luna
  ctx.font = '320px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('🌙', 256, 270);

  const iconUrl = canvas.toDataURL('image/png');

  // Apple touch icon (iOS)
  document.getElementById('apple-icon').href = iconUrl;

  // Manifest (Android/Chrome)
  const manifest = {
    name: 'Lunita',
    short_name: 'Lunita',
    description: 'Herramientas para padres primerizos',
    start_url: './',
    display: 'standalone',
    background_color: '#0b0e18',
    theme_color: '#0b0e18',
    icons: [
      { src: iconUrl, sizes: '192x192', type: 'image/png' },
      { src: iconUrl, sizes: '512x512', type: 'image/png' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], { type: 'application/json' });
  const link = document.createElement('link');
  link.rel = 'manifest';
  link.href = URL.createObjectURL(blob);
  document.head.appendChild(link);
</script>

<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── STORAGE (localStorage) ────────────────────────────────────────────────────

const loadEntries = () => { try { const d = localStorage.getItem(STORAGE_KEY); return d ? JSON.parse(d) : []; } catch { return []; } };

// ─── CONSTANTS ─────────────────────────────────────────────────────────────────
const LIGHT_COLORS = [

];

const SOUNDS = [

  { id:"pink",   label:"Ruido rosa",      emoji:"🌸" },
  { id:"heart",  label:"Latidos",         emoji:"💓" },
  { id:"rain",   label:"Lluvia",          emoji:"🌧️" },

// ─── AUDIO ENGINE ──────────────────────────────────────────────────────────────
function buildNoiseBuffer(ctx, type) {
  const sr = ctx.sampleRate, n = sr * 7;
  const buf = ctx.createBuffer(1, n, sr);
  const d = buf.getChannelData(0);
  if (type === "white") {
    for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  } else if (type === "pink") {
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;
    for(let i=0;i<n;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;b2=0.9690*b2+w*0.153852;b3=0.8665*b3+w*0.3104856;b4=0.5500*b4+w*0.5329522;b5=-0.7616*b5-w*0.016898;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)/7;b6=w*0.115926;}
  } else if (type === "fan") {
    let last=0;for(let i=0;i<n;i++){const w=Math.random()*2-1;d[i]=(last+0.02*w)/1.02;last=d[i];d[i]*=3.5;}
  } else if (type === "rain") {
    let b0=0,b1=0,b2=0;for(let i=0;i<n;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555;b1=0.99332*b1+w*0.075;b2=0.969*b2+w*0.1538;d[i]=(b0+b1+b2)/3+(Math.random()<0.001?(Math.random()*2-1)*0.5:0);}
  } else if (type === "waves") {
    let b0=0,b1=0,b2=0;for(let i=0;i<n;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555;b1=0.99332*b1+w*0.075;b2=0.969*b2+w*0.1538;d[i]=(b0+b1+b2)/3*(0.25+0.75*Math.abs(Math.sin(Math.PI*i/(sr*3.5))));}
  } else if (type === "shush") {
    let b0=0,b1=0;for(let i=0;i<n;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555;b1=0.99332*b1+w*0.075;d[i]=(b0+b1)/2*(0.35+0.65*Math.pow(Math.abs(Math.sin(Math.PI*i/(sr*1.3))),2));}
  } else if (type === "womb") {
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0;for(let i=0;i<n;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555;b1=0.99332*b1+w*0.075;b2=0.969*b2+w*0.1538;b3=0.8665*b3+w*0.3104;b4=0.55*b4+w*0.5329;b5=-0.7616*b5-w*0.0168;d[i]=(b0+b1+b2+b3+b4+b5)/6*(0.6+0.4*Math.sin(2*Math.PI*i/(sr*10)));}
  }
  return buf;
}

function buildHeartbeat(ctx) {
  const sr = ctx.sampleRate, beatLen = Math.round(sr * 60 / 65), beats = 4;
  const buf = ctx.createBuffer(1, beatLen * beats, sr);
  const d = buf.getChannelData(0);
  const hit = (start, freq, dur, amp) => { for(let i=0;i<dur*sr&&start+i<d.length;i++) d[start+i]+=Math.sin(2*Math.PI*freq*i/sr)*Math.exp(-i/(sr*0.07))*amp; };
  for(let b=0;b<beats;b++){hit(b*beatLen,55,0.15,0.9);hit(b*beatLen+Math.round(sr*0.22),45,0.12,0.7);}
  return buf;
}

class AudioEngine {
  constructor(){this.ctx=null;this.nodes={};}
  init(){if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();if(this.ctx.state==="suspended")this.ctx.resume();}
  play(id,vol=0.7){
    this.init();if(this.nodes[id])return;
    const ctx=this.ctx,gain=ctx.createGain();gain.gain.value=vol;gain.connect(ctx.destination);
    const buf=id==="heart"?buildHeartbeat(ctx):buildNoiseBuffer(ctx,id);
    const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;
    if(id==="fan"){const f=ctx.createBiquadFilter();f.type="lowpass";f.frequency.value=700;src.connect(f);f.connect(gain);}
    else if(id==="womb"){const f=ctx.createBiquadFilter();f.type="lowpass";f.frequency.value=400;src.connect(f);f.connect(gain);}
    else if(id==="rain"){const f=ctx.createBiquadFilter();f.type="highpass";f.frequency.value=900;src.connect(f);f.connect(gain);}
    else src.connect(gain);
    src.start();this.nodes[id]={src,gain};
  }
  stop(id){
    if(!this.nodes[id])return;
    const{src,gain}=this.nodes[id];
    gain.gain.linearRampToValueAtTime(0,this.ctx.currentTime+0.5);
    setTimeout(()=>{try{src.stop();}catch{}gain.disconnect();},600);
    delete this.nodes[id];
  }
  setVol(id,v){if(this.nodes[id])this.nodes[id].gain.gain.value=v;}
  destroy(){Object.keys(this.nodes).forEach(id=>this.stop(id));if(this.ctx){this.ctx.close();this.ctx=null;}}
}

// ─── HELPERS ───────────────────────────────────────────────────────────────────
const todayStr   = () => new Date().toISOString().slice(0,10);
const nowTimeStr = () => { const d=new Date(); return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; };
const hexA       = (hex,a) => { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; };

const calcDur = (sd,st,ed,et) => {
  if(!sd||!st||!ed||!et) return null;
  const diff=(new Date(`${ed}T${et}`)-new Date(`${sd}T${st}`))/1000;
  return diff>0?Math.round(diff):null;
};
const fmtDur = s => {
  if(!s||s<=0) return "—";
  const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;
  if(h>0) return `${h}h ${m}min`;
  return m>0?`${m}min${sec>0?` ${sec}s`:""}`:`${sec}s`;
};
const fmtDateTime = (date,time) => {
  if(!time) return "—"; if(!date) return time;
  const d=new Date(`${date}T${time}`),today=new Date(),yest=new Date(today);yest.setDate(yest.getDate()-1);
  if(d.toDateString()===today.toDateString()) return time;
  if(d.toDateString()===yest.toDateString()) return `Ayer ${time}`;
  return `${d.getDate()} ${d.toLocaleDateString("es-ES",{month:"short"})} ${time}`;
};

// ─── DESIGN ────────────────────────────────────────────────────────────────────
const C = {
  bg:"#0b0e18", surface:"#141824", elevated:"#1d2333", border:"#252d3d",
  text:"#e8eaf6", muted:"#7b82a0", accent:"#f5a623", accentDim:"#f5a62322",
  blue:"#62a8f5", orange:"#fb923c"
};

const bigBtn     = { width:"100%", padding:"15px 16px", borderRadius:14, border:`1px solid ${C.border}`, backgroundColor:C.elevated, color:C.text, fontSize:15, fontWeight:700, cursor:"pointer", marginBottom:10, display:"flex", alignItems:"center", gap:12, boxSizing:"border-box", fontFamily:"inherit", textAlign:"left" };
const primaryBtn = { ...bigBtn, backgroundColor:C.accent, color:"#080b14", border:"none", justifyContent:"center", fontSize:16 };
const ghostBtn   = { ...bigBtn, backgroundColor:"transparent", color:C.muted, fontSize:13, justifyContent:"center", borderColor:"transparent" };
const nowBtn     = { ...bigBtn, borderColor:C.accent, color:C.accent, backgroundColor:C.accentDim };
const selBtn     = active => ({ ...bigBtn, ...(active ? { borderColor:C.accent, backgroundColor:C.accentDim, color:C.accent } : {}) });
const UL         = { fontSize:11, color:C.muted, marginBottom:8, display:"block", letterSpacing:0.5, textTransform:"uppercase" };
const tInput     = { padding:"13px", backgroundColor:C.elevated, border:`1px solid ${C.border}`, borderRadius:12, color:C.text, fontSize:18, fontFamily:"inherit", fontWeight:800, boxSizing:"border-box" };
const OVERLAY    = { position:"fixed", inset:0, backgroundColor:"rgba(0,0,0,0.85)", zIndex:300, display:"flex", alignItems:"flex-end" };
const SHEET      = { backgroundColor:C.surface, width:"100%", borderRadius:"22px 22px 0 0", padding:"28px 20px 44px", maxHeight:"90vh", overflowY:"auto", border:`1px solid ${C.border}`, boxSizing:"border-box" };

// ─── SUBCOMPONENTS ─────────────────────────────────────────────────────────────
function DTPicker({ date, time, onDate, onTime, label }) {
  return (
    <div style={{marginBottom:14}}>
      {label && <label style={UL}>{label}</label>}
      <div style={{display:"flex",gap:8}}>
        <input type="date" value={date} max={todayStr()} onChange={e=>onDate(e.target.value)} style={{...tInput,flex:"1 1 auto",fontSize:14}}/>
        <input type="time" value={time} onChange={e=>onTime(e.target.value)} style={{...tInput,flex:"0 0 auto",width:110}}/>
      </div>
    </div>
  );
}

function SRow({ label, value, hi }) {
  return (
    <div style={{display:"flex",justifyContent:"space-between",padding:"10px 0",borderBottom:`1px solid ${C.border}`}}>
      <span style={{fontSize:13,color:C.muted}}>{label}</span>
      <span style={{fontSize:15,fontWeight:700,color:hi?C.accent:C.text}}>{value}</span>
    </div>
  );
}

function CommentBox({ value, onChange }) {
  return (
    <div style={{marginBottom:16}}>
      <label style={UL}>Nota (opcional)</label>
      <textarea value={value} onChange={e=>onChange(e.target.value)}
        placeholder="Ej: probamos la pezonera nueva · médico · parque…"
        rows={2} style={{width:"100%",padding:"12px 14px",backgroundColor:C.elevated,border:`1px solid ${C.border}`,borderRadius:12,color:C.text,fontSize:14,fontFamily:"inherit",resize:"none",boxSizing:"border-box",lineHeight:1.5}}/>
    </div>
  );
}

// ─── ADD ENTRY MODAL ───────────────────────────────────────────────────────────
function AddEntryModal({ onSave, onClose }) {
  const [step,  setStep]   = useState(0);
  const [type,  setType]   = useState(null);
  const [breast,setBreast] = useState(null);
  const [sd,setSd] = useState(todayStr());
  const [st,setSt] = useState("");
  const [ed,setEd] = useState(todayStr());
  const [et,setEt] = useState("");
  const [diaper,setDiaper] = useState(null);
  const [amount,setAmount] = useState(null);
  const [comment,setComment] = useState("");
  const dur = calcDur(sd,st,ed,et);
  const T = text => <div style={{fontSize:19,fontWeight:900,marginBottom:22,color:C.text}}>{text}</div>;

  const saveComplete = () => {
    if(type==="toma") onSave({type:"toma",status:"done",breast,startDate:sd,startTime:st,endDate:ed,endTime:et,duration:dur,comment});
    else onSave({type:"panal",diaperType:diaper,amount,comment});
    onClose();
  };
  const saveInProgress = () => { onSave({type:"toma",status:"en_curso",breast,startDate:sd,startTime:st,comment}); onClose(); };

  if(step===0) return (
    <div style={OVERLAY} onClick={onClose}><div className="sheet" style={SHEET} onClick={e=>e.stopPropagation()}>
      {T("¿Qué vas a registrar?")}
      <button style={bigBtn} onClick={()=>{setType("toma");setStep(1);}}>
        <span style={{fontSize:26}}>🤱</span>
        <div><div style={{fontWeight:800,fontSize:16}}>Toma de pecho</div><div style={{fontSize:12,color:C.muted,fontWeight:400}}>Lactancia o biberón</div></div>
      </button>
      <button style={bigBtn} onClick={()=>{setType("panal");setStep(10);}}>
        <span style={{fontSize:26}}>🧷</span>
        <div><div style={{fontWeight:800,fontSize:16}}>Cambio de pañal</div><div style={{fontSize:12,color:C.muted,fontWeight:400}}>Registrar tipo y cantidad</div></div>
      </button>
      <button style={ghostBtn} onClick={onClose}>Cancelar</button>
    </div></div>
  );

  if(type==="toma"&&step===1) return (
    <div style={OVERLAY}><div className="sheet" style={SHEET}>
      {T("¿Qué pecho?")}
      <button style={selBtn(breast==="left")}  onClick={()=>{setBreast("left"); setStep(2);}}><span style={{fontSize:24}}>⬅️</span><div style={{fontWeight:800}}>Pecho izquierdo</div></button>
      <button style={selBtn(breast==="right")} onClick={()=>{setBreast("right");setStep(2);}}><span style={{fontSize:24}}>➡️</span><div style={{fontWeight:800}}>Pecho derecho</div></button>
      <button style={ghostBtn} onClick={onClose}>Cancelar</button>
    </div></div>
  );

  if(type==="toma"&&step===2) return (
    <div style={OVERLAY}><div className="sheet" style={SHEET}>
      {T("¿Cuándo empezó la toma?")}
      <button style={nowBtn} onClick={()=>{setSd(todayStr());setSt(nowTimeStr());setStep(3);}}>
        <span style={{fontSize:20}}>🕐</span>
        <div><div style={{fontWeight:800}}>¿Es ahora?</div><div style={{fontSize:12,fontWeight:400}}>{new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})}</div></div>
      </button>
      <div style={{margin:"16px 0 0"}}>
        <DTPicker label="O elige fecha y hora" date={sd} time={st} onDate={setSd} onTime={setSt}/>
      </div>
      {st && <>
        <button style={primaryBtn} onClick={()=>setStep(3)}>Siguiente →</button>
        <button style={{...bigBtn,borderColor:C.orange,color:C.orange,backgroundColor:hexA(C.orange,0.1),justifyContent:"center",fontSize:14}} onClick={saveInProgress}>
          ⏱ Guardar inicio · añadir fin después
        </button>
      </>}
      <button style={ghostBtn} onClick={()=>setStep(1)}>← Atrás</button>
    </div></div>
  );

  if(type==="toma"&&step===3) return (
    <div style={OVERLAY}><div className="sheet" style={SHEET}>
      {T("¿Cuándo terminó la toma?")}
      <div style={{backgroundColor:C.elevated,borderRadius:12,padding:"10px 14px",marginBottom:16,border:`1px solid ${C.border}`,display:"flex",gap:20}}>
        <div><div style={{fontSize:11,color:C.muted}}>Pecho</div><div style={{fontWeight:800,fontSize:14}}>{breast==="left"?"⬅️ Izq":"➡️ Dch"}</div></div>
        <div><div style={{fontSize:11,color:C.muted}}>Inicio</div><div style={{fontWeight:800,fontSize:14,color:C.accent}}>{fmtDateTime(sd,st)}</div></div>
      </div>
      <button style={nowBtn} onClick={()=>{setEd(todayStr());setEt(nowTimeStr());setStep(4);}}>
        <span style={{fontSize:20}}>🕐</span>
        <div><div style={{fontWeight:800}}>¿Es ahora?</div><div style={{fontSize:12,fontWeight:400}}>{new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})}</div></div>
      </button>
      <div style={{margin:"16px 0 0"}}>
        <DTPicker label="O elige fecha y hora" date={ed} time={et} onDate={setEd} onTime={setEt}/>
      </div>
      {et && <button style={primaryBtn} onClick={()=>setStep(4)}>Ver resumen →</button>}
      <button style={ghostBtn} onClick={()=>setStep(2)}>← Atrás</button>
    </div></div>
  );

  if(type==="toma"&&step===4) return (
    <div style={OVERLAY}><div className="sheet" style={SHEET}>
      {T("✅ Resumen de la toma")}
      <div style={{backgroundColor:C.elevated,borderRadius:14,padding:"4px 16px 8px",marginBottom:18,border:`1px solid ${C.border}`}}>
        <SRow label="Pecho"    value={breast==="left"?"⬅️ Izquierdo":"➡️ Derecho"}/>
        <SRow label="Inicio"   value={fmtDateTime(sd,st)}/>
        <SRow label="Fin"      value={fmtDateTime(ed,et)}/>
        <SRow label="Duración" value={fmtDur(dur)} hi/>
      </div>
      <CommentBox value={comment} onChange={setComment}/>
      <button style={primaryBtn} onClick={saveComplete}>💾 Guardar toma</button>
      <button style={ghostBtn} onClick={onClose}>Cancelar</button>
    </div></div>
  );

  if(type==="panal"&&step===10) return (
    <div style={OVERLAY}><div className="sheet" style={SHEET}>
      {T("¿Qué tipo de pañal?")}
      {[{id:"pis",label:"Solo pipí",sub:"Sin caca",emoji:"💧"},{id:"caca",label:"Solo caca",sub:"Sin pipí",emoji:"💩"},{id:"mixto",label:"Pipí + caca",sub:"Los dos juntos",emoji:"🌊"}].map(t=>(
        <button key={t.id} style={selBtn(diaper===t.id)} onClick={()=>{setDiaper(t.id);setStep(t.id==="pis"?12:11);}}>
          <span style={{fontSize:24}}>{t.emoji}</span>
          <div><div style={{fontWeight:800}}>{t.label}</div><div style={{fontSize:12,color:C.muted,fontWeight:400}}>{t.sub}</div></div>
        </button>
      ))}
      <button style={ghostBtn} onClick={onClose}>Cancelar</button>
    </div></div>
  );

  if(type==="panal"&&step===11) return (
    <div style={OVERLAY}><div className="sheet" style={SHEET}>
      {T("💩 ¿Cuánta caca?")}
      {[{id:"Poco",emoji:"🔹",desc:"Manchita pequeña"},{id:"Normal",emoji:"🟡",desc:"Cantidad habitual"},{id:"Mucho",emoji:"🔴",desc:"Cagada épica 😅"}].map(a=>(
        <button key={a.id} style={selBtn(amount===a.id)} onClick={()=>{setAmount(a.id);setStep(12);}}>
          <span style={{fontSize:22}}>{a.emoji}</span>
          <div><div style={{fontWeight:800}}>{a.id}</div><div style={{fontSize:12,color:C.muted,fontWeight:400}}>{a.desc}</div></div>
        </button>
      ))}
      <button style={ghostBtn} onClick={()=>setStep(10)}>← Atrás</button>
    </div></div>
  );

  if(type==="panal"&&step===12) return (
    <div style={OVERLAY}><div className="sheet" style={SHEET}>
      {T("✅ Guardar pañal")}
      <div style={{backgroundColor:C.elevated,borderRadius:14,padding:"4px 16px 8px",marginBottom:18,border:`1px solid ${C.border}`}}>
        <SRow label="Tipo"     value={({pis:"💧 Pipí",caca:"💩 Caca",mixto:"🌊 Mixto"})[diaper]}/>
        {amount && <SRow label="Cantidad" value={amount} hi/>}
      </div>
      <CommentBox value={comment} onChange={setComment}/>
      <button style={primaryBtn} onClick={saveComplete}>💾 Guardar pañal</button>
      <button style={ghostBtn} onClick={()=>setStep(diaper==="pis"?10:11)}>← Atrás</button>
    </div></div>
  );

  return null;
}

// ─── FINALIZE MODAL ────────────────────────────────────────────────────────────
function FinalizeModal({ entry, onUpdate, onClose }) {
  const [ed,setEd] = useState(todayStr());
  const [et,setEt] = useState("");
  const dur = calcDur(entry.startDate, entry.startTime, ed, et);
  const save = () => { onUpdate(entry.id,{status:"done",endDate:ed,endTime:et,duration:dur}); onClose(); };
  return (
    <div style={OVERLAY}><div className="sheet" style={SHEET}>
      <div style={{fontSize:19,fontWeight:900,marginBottom:22,color:C.text}}>⏱ Añadir fin de toma</div>
      <div style={{backgroundColor:C.elevated,borderRadius:12,padding:"10px 14px",marginBottom:16,display:"flex",gap:20,border:`1px solid ${C.border}`}}>
        <div><div style={{fontSize:11,color:C.muted}}>Pecho</div><div style={{fontWeight:800,fontSize:14}}>{entry.breast==="left"?"⬅️ Izq":"➡️ Dch"}</div></div>
        <div><div style={{fontSize:11,color:C.muted}}>Inicio</div><div style={{fontWeight:800,fontSize:14,color:C.accent}}>{fmtDateTime(entry.startDate,entry.startTime)}</div></div>
      </div>
      <button style={nowBtn} onClick={()=>{setEd(todayStr());setEt(nowTimeStr());}}>
        <span style={{fontSize:20}}>🕐</span>
        <div><div style={{fontWeight:800}}>¿Es ahora?</div><div style={{fontSize:12,fontWeight:400}}>{new Date().toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"})}</div></div>
      </button>
      <div style={{margin:"14px 0 0"}}>
        <DTPicker label="O elige fecha y hora" date={ed} time={et} onDate={setEd} onTime={setEt}/>
      </div>
      {et && (
        <div style={{backgroundColor:C.elevated,borderRadius:10,padding:"10px 14px",marginBottom:14,textAlign:"center",border:`1px solid ${C.border}`}}>
          <div style={{fontSize:12,color:C.muted}}>Duración</div>
          <div style={{fontSize:24,fontWeight:900,color:C.accent}}>{fmtDur(dur)}</div>
        </div>
      )}
      {et && <button style={primaryBtn} onClick={save}>💾 Guardar fin de toma</button>}
      <button style={ghostBtn} onClick={onClose}>Cancelar</button>
    </div></div>
  );
}

// ─── ENTRY CARD ────────────────────────────────────────────────────────────────
function EntryCard({ entry, onDelete, onFinalize }) {
  const inProgress = entry.type==="toma" && entry.status==="en_curso";
  const emoji = entry.type==="toma"
    ? (entry.breast==="left"?"🤱":"🍼")
    : ({pis:"💧",caca:"💩",mixto:"🌊"}[entry.diaperType]||"🧷");
  const detail = entry.type==="toma"
    ? `${entry.breast==="left"?"Pecho izq.":"Pecho dch."} · ${inProgress?"en curso…":fmtDur(entry.duration)}`
    : `${({pis:"Pipí",caca:"Caca",mixto:"Mixto"}[entry.diaperType])}${entry.amount?` · ${entry.amount}`:""}`;
  const timeLabel = entry.type==="toma"&&entry.startTime
    ? `${fmtDateTime(entry.startDate,entry.startTime)}${entry.endTime?` → ${fmtDateTime(entry.endDate,entry.endTime)}`:""}`
    : fmtDateTime(todayStr(),new Date(entry.createdAt).toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"}));
  return (
    <div style={{backgroundColor:C.surface,borderRadius:14,padding:"13px 14px",margin:"0 14px 10px",border:`1px solid ${inProgress?C.orange:C.border}`}}>
      <div style={{display:"flex",alignItems:"center",gap:12}}>
        <div style={{position:"relative",flexShrink:0}}>
          <div style={{fontSize:26,width:38,textAlign:"center"}}>{emoji}</div>
          {inProgress&&<div style={{position:"absolute",top:-2,right:-2,width:10,height:10,borderRadius:5,backgroundColor:C.orange,animation:"pulse 1.5s ease-in-out infinite"}}/>}
        </div>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span style={{fontSize:14,fontWeight:800}}>{entry.type==="toma"?"Toma":"Pañal"}</span>
            {inProgress&&<span style={{fontSize:10,fontWeight:800,color:C.orange,backgroundColor:hexA(C.orange,0.15),padding:"2px 7px",borderRadius:6}}>EN CURSO</span>}
            <span style={{fontSize:12,color:C.muted}}>{timeLabel}</span>
          </div>
          <div style={{fontSize:12,color:C.muted,marginTop:3}}>{detail}</div>
          {entry.comment&&<div style={{fontSize:12,color:C.blue,marginTop:5,fontStyle:"italic"}}>💬 {entry.comment}</div>}
        </div>
        <button onClick={()=>onDelete(entry.id)} style={{border:"none",background:"none",color:C.muted,fontSize:17,cursor:"pointer",padding:"4px 6px",flexShrink:0}}>✕</button>
      </div>
      {inProgress&&(
        <button onClick={()=>onFinalize(entry)} style={{...bigBtn,marginTop:10,marginBottom:0,justifyContent:"center",backgroundColor:hexA(C.orange,0.12),borderColor:C.orange,color:C.orange,fontSize:13}}>
          ⏱ Añadir hora de fin
        </button>
      )}
    </div>
  );
}

// ─── REGISTRO VIEW ─────────────────────────────────────────────────────────────
function RegistroView({ entries, onDelete, onFinalize }) {
  const today = new Date().toDateString();
  const todayE = entries.filter(e=>new Date(e.createdAt).toDateString()===today);
  const enCurso = entries.filter(e=>e.status==="en_curso").length;
  return (
    <div>
      <div style={{padding:"18px 16px 14px"}}>
        <div style={{display:"flex",gap:10}}>
          {[{label:"Tomas hoy",value:todayE.filter(e=>e.type==="toma").length,emoji:"🤱"},{label:"Pañales hoy",value:todayE.filter(e=>e.type==="panal").length,emoji:"🧷"}].map(s=>(
            <div key={s.label} style={{flex:1,backgroundColor:C.surface,borderRadius:14,padding:"12px 14px",border:`1px solid ${C.border}`}}>
              <div style={{fontSize:22}}>{s.emoji}</div>
              <div style={{fontSize:24,fontWeight:900,color:C.accent,lineHeight:1.1}}>{s.value}</div>
              <div style={{fontSize:11,color:C.muted,marginTop:2}}>{s.label}</div>
            </div>
          ))}
        </div>
        {enCurso>0&&(
          <div style={{marginTop:10,backgroundColor:hexA(C.orange,0.1),borderRadius:12,padding:"10px 14px",border:`1px solid ${hexA(C.orange,0.4)}`,display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>⏱</span>
            <span style={{fontSize:13,fontWeight:700,color:C.orange}}>{enCurso} toma{enCurso>1?"s":""} en curso — pulsa para añadir el fin</span>
          </div>
        )}
      </div>
      {entries.length===0?(
        <div style={{textAlign:"center",padding:"60px 24px",color:C.muted}}>
          <div style={{fontSize:52,marginBottom:14}}>🌙</div>
          <div style={{fontSize:17,fontWeight:800,color:C.text}}>Sin registros todavía</div>
          <div style={{fontSize:13,marginTop:8,lineHeight:1.6}}>Pulsa <strong style={{color:C.accent}}>+</strong> para añadir la primera toma o cambio de pañal</div>
        </div>
      ):(
        <div style={{paddingTop:4}}>
          {entries.map(e=><EntryCard key={e.id} entry={e} onDelete={onDelete} onFinalize={onFinalize}/>)}
        </div>
      )}
    </div>
  );
}

// ─── LINTERNA VIEW ─────────────────────────────────────────────────────────────
function LinternaView({ color, setColor, brightness, setBrightness, active, setActive }) {
  return (
    <div style={{padding:16}}>
      <div style={{backgroundColor:C.surface,borderRadius:16,padding:16,marginBottom:14,border:`1px solid ${C.border}`}}>
        <div style={{...UL,marginBottom:12}}>Color</div>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          {LIGHT_COLORS.map(c=>(
            <button key={c.id} onClick={()=>setColor(c)} style={{width:44,height:44,borderRadius:22,backgroundColor:c.hex,cursor:"pointer",border:`3px solid ${color.id===c.id?C.accent:"transparent"}`,boxShadow:color.id===c.id?`0 0 16px ${c.hex}90`:"none",transition:"all 0.2s"}} title={c.label}/>
          ))}
        </div>
        <div style={{marginTop:14,padding:"8px 12px",backgroundColor:C.elevated,borderRadius:10,display:"flex",alignItems:"center",gap:10}}>
          <div style={{width:20,height:20,borderRadius:10,backgroundColor:hexA(color.hex,brightness),border:`1px solid ${C.border}`}}/>
          <span style={{fontSize:13,color:C.text}}>{color.label}</span>
        </div>
      </div>
      <div style={{backgroundColor:C.surface,borderRadius:16,padding:16,marginBottom:14,border:`1px solid ${C.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
          <span style={UL}>Brillo</span>
          <span style={{fontSize:16,fontWeight:800,color:C.accent}}>{Math.round(brightness*100)}%</span>
        </div>
        <input type="range" min={5} max={100} value={Math.round(brightness*100)} onChange={e=>setBrightness(e.target.value/100)} style={{width:"100%",cursor:"pointer"}}/>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:6}}>
          <span style={{fontSize:11,color:C.muted}}>🌑 Suave</span>
          <span style={{fontSize:11,color:C.muted}}>☀️ Intensa</span>
        </div>
      </div>
      <button onClick={()=>setActive(true)} style={{width:"100%",padding:17,borderRadius:16,border:"none",cursor:"pointer",backgroundColor:C.accent,color:"#080b14",fontSize:17,fontWeight:900,fontFamily:"inherit",boxShadow:`0 6px 24px ${hexA(C.accent,0.35)}`,marginBottom:14}}>
        💡 Activar linterna
      </button>
      <div style={{backgroundColor:C.surface,borderRadius:14,padding:"12px 14px",border:`1px solid ${C.border}`}}>
        <div style={{fontSize:12,color:C.muted,lineHeight:1.7}}>💡 El <strong style={{color:C.text}}>rojo</strong> y el <strong style={{color:C.text}}>cálido</strong> son los colores menos disruptivos de noche.<br/>Toca la pantalla para apagar.</div>
      </div>
      {active&&(
        <div onClick={()=>setActive(false)} style={{position:"fixed",inset:0,zIndex:999,backgroundColor:hexA(color.hex,brightness),display:"flex",alignItems:"flex-end",justifyContent:"center",paddingBottom:48}}>
          <div style={{color:brightness>0.5?"rgba(0,0,0,0.4)":"rgba(255,255,255,0.3)",fontSize:13,fontWeight:700,userSelect:"none"}}>Toca para apagar</div>
        </div>
      )}
    </div>
  );
}

// ─── SONIDOS VIEW ──────────────────────────────────────────────────────────────
function SonidosView({ playing, volumes, onToggle, onVolume }) {
  const n = Object.keys(playing).length;
  return (
    <div style={{padding:16}}>
      {n>0&&<div style={{backgroundColor:hexA(C.accent,0.12),borderRadius:12,padding:"10px 14px",marginBottom:14,border:`1px solid ${hexA(C.accent,0.3)}`,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:16}}>🔊</span>
        <span style={{fontSize:13,fontWeight:700,color:C.accent}}>{n} sonido{n>1?"s":""} activo{n>1?"s":""}</span>
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {SOUNDS.map(s=>{const on=!!playing[s.id]; return(
          <div key={s.id} onClick={()=>onToggle(s.id)} style={{backgroundColor:on?hexA(C.accent,0.12):C.surface,border:`1px solid ${on?C.accent:C.border}`,borderRadius:16,padding:"14px 12px",cursor:"pointer",userSelect:"none"}}>
            <div style={{fontSize:30,textAlign:"center",marginBottom:6}}>{s.emoji}</div>
            <div style={{fontSize:12,fontWeight:800,textAlign:"center",marginBottom:10,color:on?C.accent:C.text}}>{s.label}</div>
            <div style={{textAlign:"center",fontSize:11,fontWeight:700,padding:"5px 10px",borderRadius:8,backgroundColor:on?C.accent:C.elevated,color:on?"#080b14":C.muted}}>{on?"▐▐ Parar":"▶ Reproducir"}</div>
            {on&&<input type="range" min={0} max={100} value={Math.round(volumes[s.id]*100)}
              onChange={e=>{e.stopPropagation();onVolume(s.id,e.target.value/100);}}
              onClick={e=>e.stopPropagation()}
              style={{width:"100%",marginTop:10,cursor:"pointer"}}/>}
          </div>
        );})}
      </div>
      <div style={{marginTop:14,backgroundColor:C.surface,borderRadius:12,padding:"10px 14px",border:`1px solid ${C.border}`,textAlign:"center"}}>
        <div style={{fontSize:12,color:C.muted}}>Puedes combinar varios sonidos a la vez</div>
      </div>
    </div>
  );
}

// ─── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [tab,setTab]         = useState("registro");
  const [entries,setEntries] = useState(()=>loadEntries());
  const [modal,setModal]     = useState(false);
  const [finalEntry,setFinal]= useState(null);
  const [lightColor,setLC]   = useState(LIGHT_COLORS[0]);
  const [brightness,setBr]   = useState(0.65);
  const [lightActive,setLA]  = useState(false);
  const [playing,setPlaying] = useState({});
  const [volumes,setVolumes] = useState(SOUNDS.reduce((a,s)=>({...a,[s.id]:0.7}),{}));
  const audioRef = useRef(null);

  useEffect(()=>{
    audioRef.current = new AudioEngine();
    return ()=>audioRef.current?.destroy();
  },[]);

  const persist = useCallback(ne=>{
    setEntries(ne);
    saveEntries(ne);
  },[]);

  const addEntry    = e => persist([{...e,id:Date.now(),createdAt:new Date().toISOString()},...entries]);
  const delEntry    = id => persist(entries.filter(e=>e.id!==id));
  const updateEntry = (id,upd) => persist(entries.map(e=>e.id===id?{...e,...upd}:e));

  const toggleSound = id => {
    const eng=audioRef.current; if(!eng)return;
    if(playing[id]){eng.stop(id);setPlaying(p=>{const n={...p};delete n[id];return n;});}
    else{eng.play(id,volumes[id]);setPlaying(p=>({...p,[id]:true}));}
  };
  const setVol=(id,v)=>{setVolumes(p=>({...p,[id]:v}));if(playing[id])audioRef.current?.setVol(id,v);};

  return (
    <div style={{minHeight:"100vh",backgroundColor:C.bg,color:C.text,fontFamily:"'Nunito', system-ui, sans-serif",display:"flex",flexDirection:"column"}}>
      {/* Header */}
      <div style={{padding:"calc(env(safe-area-inset-top, 0px) + 14px) 16px 10px",borderBottom:`1px solid ${C.border}`,backgroundColor:C.bg,flexShrink:0}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:24}}>🌙</span>
          <div>
            <div style={{fontSize:20,fontWeight:900,letterSpacing:-0.5}}>Lunita</div>
            <div style={{fontSize:11,color:C.muted}}>Herramientas para padres</div>
          </div>
        </div>
      </div>

      {/* Content */}
      <div style={{flex:1,overflowY:"auto",paddingBottom:72}}>
        {tab==="registro"&&<RegistroView entries={entries} onDelete={delEntry} onFinalize={setFinal}/>}
        {tab==="linterna"&&<LinternaView color={lightColor} setColor={setLC} brightness={brightness} setBrightness={setBr} active={lightActive} setActive={setLA}/>}
        {tab==="sonidos" &&<SonidosView  playing={playing} volumes={volumes} onToggle={toggleSound} onVolume={setVol}/>}
      </div>

      {/* FAB */}
      {tab==="registro"&&(
        <button onClick={()=>setModal(true)} style={{position:"fixed",bottom:80,right:18,width:54,height:54,borderRadius:27,backgroundColor:C.accent,border:"none",cursor:"pointer",fontSize:28,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 20px ${hexA(C.accent,0.45)}`,zIndex:50,color:"#080b14",fontWeight:900,fontFamily:"inherit"}}>＋</button>
      )}

      {/* Bottom Nav */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,backgroundColor:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",paddingBottom:"env(safe-area-inset-bottom, 0px)"}}>
        {[{id:"registro",label:"Registro",emoji:"📋"},{id:"linterna",label:"Linterna",emoji:"💡"},{id:"sonidos",label:"Sonidos",emoji:"🎵"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"10px 0 12px",border:"none",background:"none",cursor:"pointer",fontFamily:"inherit"}}>
            <span style={{fontSize:22,filter:tab===t.id?"none":"grayscale(1) opacity(0.45)"}}>{t.emoji}</span>
            <span style={{fontSize:10,fontWeight:800,color:tab===t.id?C.accent:C.muted}}>{t.label}</span>
          </button>
        ))}
      </div>

      {modal     &&<AddEntryModal onSave={addEntry}  onClose={()=>setModal(false)}/>}
      {finalEntry&&<FinalizeModal entry={finalEntry} onUpdate={updateEntry} onClose={()=>setFinal(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
