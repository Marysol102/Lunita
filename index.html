<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

// ─── STORAGE ───────────────────────────────────────────────────────────────────
const LS_ENTRIES = "lunita_v2";
const LS_SETUP   = "lunita_setup";

const saveLocal  = d  => { try { localStorage.setItem(LS_ENTRIES, JSON.stringify(d)); } catch {} };

// ─── FIREBASE ──────────────────────────────────────────────────────────────────
const salaRef    = code => db.collection("lunita_salas").doc(code);
const genCode    = name => {
  const prefix = name.toUpperCase().replace(/[^A-ZÁÉÍÓÚÑ]/gi,"").normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^A-Z]/g,"").slice(0,4).padEnd(4,"X");
  return `${prefix}-${Math.floor(1000+Math.random()*9000)}`;
};
const createSala = async (code, babyName) => {
  await salaRef(code).set({ babyName, entries:[], updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
};
const getSala    = async code => { const d = await salaRef(code).get(); return d.exists ? d.data() : null; };
const pushEntries= async (code, entries) => {
  await salaRef(code).update({ entries, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
};

// ─── CONSTANTS ─────────────────────────────────────────────────────────────────

  {id:"red",label:"Rojo",hex:"#ff4455"},{id:"green",label:"Verde",hex:"#44dd88"},
  {id:"blue",label:"Azul",hex:"#55aaff"},{id:"pink",label:"Rosa",hex:"#ff88cc"},
  {id:"purple",label:"Violeta",hex:"#bb88ff"},
];
const SOUNDS = [
  {id:"white",label:"Ruido blanco",emoji:"〰️"},{id:"pink",label:"Ruido rosa",emoji:"🌸"},
  {id:"heart",label:"Latidos",emoji:"💓"},{id:"rain",label:"Lluvia",emoji:"🌧️"},
  {id:"fan",label:"Ventilador",emoji:"🌀"},{id:"shush",label:"Shhhhhh",emoji:"🤫"},
  {id:"waves",label:"Olas del mar",emoji:"🌊"},{id:"womb",label:"Vientre materno",emoji:"🫀"},
];

// ─── AUDIO ENGINE ──────────────────────────────────────────────────────────────
function buildNoise(ctx, type) {
  const sr=ctx.sampleRate, n=sr*7, buf=ctx.createBuffer(1,n,sr), d=buf.getChannelData(0);
  if(type==="white"){for(let i=0;i<n;i++)d[i]=Math.random()*2-1;}
  else if(type==="pink"){let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0,b6=0;for(let i=0;i<n;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555179;b1=0.99332*b1+w*0.0750759;b2=0.969*b2+w*0.153852;b3=0.8665*b3+w*0.3104856;b4=0.55*b4+w*0.5329522;b5=-0.7616*b5-w*0.016898;d[i]=(b0+b1+b2+b3+b4+b5+b6+w*0.5362)/7;b6=w*0.115926;}}
  else if(type==="fan"){let l=0;for(let i=0;i<n;i++){const w=Math.random()*2-1;d[i]=(l+0.02*w)/1.02;l=d[i];d[i]*=3.5;}}
  else if(type==="rain"){let b0=0,b1=0,b2=0;for(let i=0;i<n;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555;b1=0.99332*b1+w*0.075;b2=0.969*b2+w*0.1538;d[i]=(b0+b1+b2)/3+(Math.random()<0.001?(Math.random()*2-1)*0.5:0);}}
  else if(type==="waves"){let b0=0,b1=0,b2=0;for(let i=0;i<n;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555;b1=0.99332*b1+w*0.075;b2=0.969*b2+w*0.1538;d[i]=(b0+b1+b2)/3*(0.25+0.75*Math.abs(Math.sin(Math.PI*i/(sr*3.5))));}}
  else if(type==="shush"){let b0=0,b1=0;for(let i=0;i<n;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555;b1=0.99332*b1+w*0.075;d[i]=(b0+b1)/2*(0.35+0.65*Math.pow(Math.abs(Math.sin(Math.PI*i/(sr*1.3))),2));}}
  else if(type==="womb"){let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0;for(let i=0;i<n;i++){const w=Math.random()*2-1;b0=0.99886*b0+w*0.0555;b1=0.99332*b1+w*0.075;b2=0.969*b2+w*0.1538;b3=0.8665*b3+w*0.3104;b4=0.55*b4+w*0.5329;b5=-0.7616*b5-w*0.0168;d[i]=(b0+b1+b2+b3+b4+b5)/6*(0.6+0.4*Math.sin(2*Math.PI*i/(sr*10)));}}
  return buf;
}
function buildHeartbeat(ctx) {
  const sr=ctx.sampleRate, bl=Math.round(sr*60/65), beats=4, buf=ctx.createBuffer(1,bl*beats,sr), d=buf.getChannelData(0);
  const hit=(s,f,dur,a)=>{for(let i=0;i<dur*sr&&s+i<d.length;i++)d[s+i]+=Math.sin(2*Math.PI*f*i/sr)*Math.exp(-i/(sr*0.07))*a;};
  for(let b=0;b<beats;b++){hit(b*bl,55,0.15,0.9);hit(b*bl+Math.round(sr*0.22),45,0.12,0.7);}
  return buf;
}
class AudioEngine {
  constructor(){this.ctx=null;this.nodes={};}
  init(){if(!this.ctx)this.ctx=new(window.AudioContext||window.webkitAudioContext)();if(this.ctx.state==="suspended")this.ctx.resume();}
  play(id,vol=0.7){
    this.init();if(this.nodes[id])return;
    const ctx=this.ctx,gain=ctx.createGain();gain.gain.value=vol;gain.connect(ctx.destination);
    const buf=id==="heart"?buildHeartbeat(ctx):buildNoise(ctx,id);
    const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;
    if(id==="fan"){const f=ctx.createBiquadFilter();f.type="lowpass";f.frequency.value=700;src.connect(f);f.connect(gain);}
    else if(id==="womb"){const f=ctx.createBiquadFilter();f.type="lowpass";f.frequency.value=400;src.connect(f);f.connect(gain);}
    else if(id==="rain"){const f=ctx.createBiquadFilter();f.type="highpass";f.frequency.value=900;src.connect(f);f.connect(gain);}
    else src.connect(gain);
    src.start();this.nodes[id]={src,gain};
  }
  stop(id){if(!this.nodes[id])return;const{src,gain}=this.nodes[id];gain.gain.linearRampToValueAtTime(0,this.ctx.currentTime+0.5);setTimeout(()=>{try{src.stop();}catch{}gain.disconnect();},600);delete this.nodes[id];}
  setVol(id,v){if(this.nodes[id])this.nodes[id].gain.gain.value=v;}
  destroy(){Object.keys(this.nodes).forEach(id=>this.stop(id));if(this.ctx){this.ctx.close();this.ctx=null;}}
}

// ─── HELPERS ───────────────────────────────────────────────────────────────────
const todayStr   = () => new Date().toISOString().slice(0,10);
const nowTimeStr = () => { const d=new Date(); return `${String(d.getHours()).padStart(2,"0")}:${String(d.getMinutes()).padStart(2,"0")}`; };
const hexA       = (hex,a) => { const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16); return `rgba(${r},${g},${b},${a})`; };
const calcDur    = (sd,st,ed,et) => { if(!sd||!st||!ed||!et)return null; const d=(new Date(`${ed}T${et}`)-new Date(`${sd}T${st}`))/1000; return d>0?Math.round(d):null; };
const fmtDur     = s => { if(!s||s<=0)return "—"; const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60; if(h>0)return `${h}h ${m}min`; return m>0?`${m}min${sec>0?` ${sec}s`:""}`:`${sec}s`; };
const fmtDateTime= (date,time) => {
  if(!time)return "—"; if(!date)return time;
  const d=new Date(`${date}T${time}`),today=new Date(),yest=new Date(today); yest.setDate(yest.getDate()-1);
  if(d.toDateString()===today.toDateString())return time;
  if(d.toDateString()===yest.toDateString())return `Ayer ${time}`;
  return `${d.getDate()} ${d.toLocaleDateString("es-ES",{month:"short"})} ${time}`;
};

// ─── DESIGN ────────────────────────────────────────────────────────────────────
const C = { bg:"#0b0e18", surface:"#141824", elevated:"#1d2333", border:"#252d3d", text:"#e8eaf6", muted:"#7b82a0", accent:"#f5a623", accentDim:"#f5a62322", blue:"#62a8f5", orange:"#fb923c", green:"#4ade80" };
const bigBtn    = { width:"100%", padding:"15px 16px", borderRadius:14, border:`1px solid ${C.border}`, backgroundColor:C.elevated, color:C.text, fontSize:15, fontWeight:700, cursor:"pointer", marginBottom:10, display:"flex", alignItems:"center", gap:12, boxSizing:"border-box", fontFamily:"inherit", textAlign:"left" };
const primaryBtn= { ...bigBtn, backgroundColor:C.accent, color:"#080b14", border:"none", justifyContent:"center", fontSize:16 };
const ghostBtn  = { ...bigBtn, backgroundColor:"transparent", color:C.muted, fontSize:13, justifyContent:"center", borderColor:"transparent" };
const nowBtn    = { ...bigBtn, borderColor:C.accent, color:C.accent, backgroundColor:C.accentDim };
const selBtn    = a => ({ ...bigBtn, ...(a?{borderColor:C.accent,backgroundColor:C.accentDim,color:C.accent}:{}) });
const UL        = { fontSize:11, color:C.muted, marginBottom:8, display:"block", letterSpacing:0.5, textTransform:"uppercase" };
const tInput    = { padding:"13px", backgroundColor:C.elevated, border:`1px solid ${C.border}`, borderRadius:12, color:C.text, fontSize:18, fontFamily:"inherit", fontWeight:800, boxSizing:"border-box" };
const OVERLAY   = { position:"fixed", inset:0, backgroundColor:"rgba(0,0,0,0.85)", zIndex:300, display:"flex", alignItems:"flex-end" };
const SHEET     = { backgroundColor:C.surface, width:"100%", borderRadius:"22px 22px 0 0", padding:"28px 20px 44px", maxHeight:"90vh", overflowY:"auto", border:`1px solid ${C.border}`, boxSizing:"border-box" };

}

// ─── SETUP SCREEN ──────────────────────────────────────────────────────────────
function SetupScreen({ onDone }) {
  const [step,setStep]       = useState(0);
  const [name,setName]       = useState("");
  const [code,setCode]       = useState("");
  const [loading,setLoading] = useState(false);
  const [error,setError]     = useState("");

  const handleCreate = async () => {
    if(!name.trim()) return;
    setLoading(true); setError("");
    const newCode = genCode(name.trim());
    try {
      await createSala(newCode, name.trim());
      const setup = { mode:"sala", roomCode:newCode, babyName:name.trim() };
      saveSetup(setup); onDone(setup);
    } catch(e) { setError("Error al crear la sala. Comprueba tu conexión."); setLoading(false); }
  };

  const handleJoin = async () => {
    const c = code.trim().toUpperCase();
    if(!c) return;
    setLoading(true); setError("");
    try {
      const data = await getSala(c);
      if(!data) { setError("Sala no encontrada. Comprueba el código."); setLoading(false); return; }
      const setup = { mode:"sala", roomCode:c, babyName:data.babyName };
      saveSetup(setup); onDone(setup);
    } catch(e) { setError("Error al conectar. Comprueba tu conexión."); setLoading(false); }
  };

  const inp  = { ...tInput, width:"100%", fontSize:17, marginBottom:14 };
  const T    = t => <div style={{fontSize:21,fontWeight:900,marginBottom:8,color:C.text,lineHeight:1.3}}>{t}</div>;
  const Sub  = t => <div style={{fontSize:13,color:C.muted,marginBottom:24,lineHeight:1.6}}>{t}</div>;

  return (
    <div style={{minHeight:"100vh",backgroundColor:C.bg,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:24,fontFamily:"'Nunito',system-ui,sans-serif",color:C.text}}>
      <div style={{fontSize:64,marginBottom:16}}>🌙</div>
      <div style={{fontSize:28,fontWeight:900,marginBottom:4}}>Lunita</div>
      <div style={{fontSize:13,color:C.muted,marginBottom:44}}>Herramientas para padres primerizos</div>

      {step===0&&<div style={{width:"100%",maxWidth:380}}>
        {T("¿Cómo quieres usar la app?")}
        {Sub("Úsala solo en este dispositivo, o comparte los registros con tu pareja en tiempo real.")}
        <button style={bigBtn} onClick={()=>{saveSetup({mode:"local"});onDone({mode:"local"});}}>
          <span style={{fontSize:24}}>📱</span>
          <div><div style={{fontWeight:800,fontSize:16}}>Solo en este móvil</div><div style={{fontSize:12,color:C.muted,fontWeight:400}}>Los registros se guardan aquí</div></div>
        </button>
        <button style={bigBtn} onClick={()=>setStep(1)}>
          <span style={{fontSize:24}}>👨‍👩‍👧</span>
          <div><div style={{fontWeight:800,fontSize:16}}>Sala compartida</div><div style={{fontSize:12,color:C.muted,fontWeight:400}}>Sincronización en tiempo real entre dos móviles</div></div>
        </button>
      </div>}

      {step===1&&<div style={{width:"100%",maxWidth:380}}>
        {T("Sala compartida")}
        {Sub("¿Eres el primero en configurar la app o ya existe una sala?")}
        <button style={bigBtn} onClick={()=>setStep(2)}>
          <span style={{fontSize:24}}>✨</span>
          <div><div style={{fontWeight:800,fontSize:16}}>Crear sala nueva</div><div style={{fontSize:12,color:C.muted,fontWeight:400}}>Genera un código para compartir</div></div>
        </button>
        <button style={bigBtn} onClick={()=>setStep(3)}>
          <span style={{fontSize:24}}>🔑</span>
          <div><div style={{fontWeight:800,fontSize:16}}>Unirme con un código</div><div style={{fontSize:12,color:C.muted,fontWeight:400}}>El otro padre/madre ya creó la sala</div></div>
        </button>
        <button style={ghostBtn} onClick={()=>setStep(0)}>← Atrás</button>
      </div>}

      {step===2&&<div style={{width:"100%",maxWidth:380}}>
        {T("Crear sala")}
        {Sub("Escribe el nombre del bebé. Se usará para generar el código de sala.")}
        <label style={UL}>Nombre del bebé</label>
        <input value={name} onChange={e=>setName(e.target.value)} placeholder="Ej: Ignaciu" style={inp} onKeyDown={e=>e.key==="Enter"&&handleCreate()}/>
        {error&&<div style={{fontSize:13,color:C.orange,marginBottom:14}}>{error}</div>}
        <button style={primaryBtn} onClick={handleCreate} disabled={!name.trim()||loading}>
          {loading?<span className="spin">⏳</span>:"✨ Crear sala"}
        </button>
        <button style={ghostBtn} onClick={()=>{setStep(1);setError("");}}>← Atrás</button>
      </div>}

      {step===3&&<div style={{width:"100%",maxWidth:380}}>
        {T("Unirme a una sala")}
        {Sub("Introduce el código que te ha compartido el otro padre/madre.")}
        <label style={UL}>Código de sala</label>
        <input value={code} onChange={e=>setCode(e.target.value.toUpperCase())} placeholder="Ej: IGNA-4821" style={{...inp,letterSpacing:3}} onKeyDown={e=>e.key==="Enter"&&handleJoin()}/>
        {error&&<div style={{fontSize:13,color:C.orange,marginBottom:14}}>{error}</div>}
        <button style={primaryBtn} onClick={handleJoin} disabled={!code.trim()||loading}>
          {loading?<span className="spin">⏳</span>:"🔑 Unirme"}
        </button>
        <button style={ghostBtn} onClick={()=>{setStep(1);setError("");}}>← Atrás</button>
      </div>}
    </div>
  );
}

  const copy = () => { navigator.clipboard?.writeText(setup.roomCode).catch(()=>{}); setCopied(true); setTimeout(()=>setCopied(false),2000); };
  return (
    <div style={OVERLAY} onClick={onClose}><div className="sheet" style={SHEET} onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:19,fontWeight:900,marginBottom:20,color:C.text}}>👨‍👩‍👧 Sala compartida</div>
      <div style={{backgroundColor:C.elevated,borderRadius:14,padding:16,marginBottom:16,border:`1px solid ${C.border}`,textAlign:"center"}}>
        <div style={{fontSize:12,color:C.muted,marginBottom:4}}>Sala de</div>
        <div style={{fontSize:22,fontWeight:900,marginBottom:14}}>{setup.babyName}</div>
        <div style={{fontSize:11,color:C.muted,marginBottom:8}}>Código para compartir</div>

// ─── EXPORT / IMPORT ───────────────────────────────────────────────────────────
function exportJSON(entries, babyName) {
  const data = { app:"Lunita", exportedAt:new Date().toISOString(), babyName:babyName||"registros", entries };
  const blob = new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = `lunita_${(babyName||"registros").toLowerCase().replace(/\s+/g,"_")}_${todayStr()}.json`;
  a.click();
}
function ImportModal({ onImport, onClose }) {
  const [error,setError] = useState("");
  const fileRef = useRef();
  const handleFile = e => {
    const file = e.target.files[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        const entries = data.entries||(Array.isArray(data)?data:null);
        if(!entries){setError("Archivo no válido.");return;}
        onImport(entries); onClose();
      } catch { setError("No se pudo leer el archivo."); }
    };
    reader.readAsText(file);
  };
  return (
    <div style={OVERLAY} onClick={onClose}><div className="sheet" style={SHEET} onClick={e=>e.stopPropagation()}>
      <div style={{fontSize:19,fontWeight:900,marginBottom:16,color:C.text}}>📤 Importar registros</div>
      <div style={{backgroundColor:hexA(C.orange,0.1),borderRadius:12,padding:"12px 14px",marginBottom:20,border:`1px solid ${hexA(C.orange,0.4)}`}}>
        <div style={{fontSize:13,color:C.orange,lineHeight:1.6}}>⚠️ Los registros importados se <strong>añadirán</strong> a los actuales (sin borrar nada).</div>
      </div>
      <input ref={fileRef} type="file" accept=".json" onChange={handleFile} style={{display:"none"}}/>
      <button style={primaryBtn} onClick={()=>fileRef.current?.click()}>📁 Elegir archivo .json</button>
      {error&&<div style={{fontSize:13,color:C.orange,margin:"8px 0"}}>{error}</div>}
      <button style={ghostBtn} onClick={onClose}>Cancelar</button>
    </div></div>
  );
}

function EntryCard({ entry, onDelete, onFinalize }) {

  const detail=entry.type==="toma"?`${entry.breast==="left"?"Pecho izq.":"Pecho dch."} · ${ip?"en curso…":fmtDur(entry.duration)}`:`${({pis:"Pipí",caca:"Caca",mixto:"Mixto"}[entry.diaperType])}${entry.amount?` · ${entry.amount}`:""}`;
  const timeLabel=entry.type==="toma"&&entry.startTime?`${fmtDateTime(entry.startDate,entry.startTime)}${entry.endTime?` → ${fmtDateTime(entry.endDate,entry.endTime)}`:""}`
    :fmtDateTime(todayStr(),new Date(entry.createdAt).toLocaleTimeString("es-ES",{hour:"2-digit",minute:"2-digit"}));
  return (
    <div style={{backgroundColor:C.surface,borderRadius:14,padding:"13px 14px",margin:"0 14px 10px",border:`1px solid ${ip?C.orange:C.border}`}}>

          <div style={{display:"flex",alignItems:"center",gap:6,flexWrap:"wrap"}}>
            <span style={{fontSize:14,fontWeight:800}}>{entry.type==="toma"?"Toma":"Pañal"}</span>
            {ip&&<span style={{fontSize:10,fontWeight:800,color:C.orange,backgroundColor:hexA(C.orange,0.15),padding:"2px 7px",borderRadius:6}}>EN CURSO</span>}
            <span style={{fontSize:12,color:C.muted}}>{timeLabel}</span>

          {entry.comment&&<div style={{fontSize:12,color:C.blue,marginTop:5,fontStyle:"italic"}}>💬 {entry.comment}</div>}

  );

      {n>0&&<div style={{backgroundColor:hexA(C.accent,0.12),borderRadius:12,padding:"10px 14px",marginBottom:14,border:`1px solid ${hexA(C.accent,0.3)}`,display:"flex",alignItems:"center",gap:8}}>
        <span>🔊</span><span style={{fontSize:13,fontWeight:700,color:C.accent}}>{n} sonido{n>1?"s":""} activo{n>1?"s":""}</span>
      </div>}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
        {SOUNDS.map(s=>{const on=!!playing[s.id];return(
          <div key={s.id} onClick={()=>onToggle(s.id)} style={{backgroundColor:on?hexA(C.accent,0.12):C.surface,border:`1px solid ${on?C.accent:C.border}`,borderRadius:16,padding:"14px 12px",cursor:"pointer",userSelect:"none"}}>
            <div style={{fontSize:30,textAlign:"center",marginBottom:6}}>{s.emoji}</div>
            <div style={{fontSize:12,fontWeight:800,textAlign:"center",marginBottom:10,color:on?C.accent:C.text}}>{s.label}</div>
            <div style={{textAlign:"center",fontSize:11,fontWeight:700,padding:"5px 10px",borderRadius:8,backgroundColor:on?C.accent:C.elevated,color:on?"#080b14":C.muted}}>{on?"▐▐ Parar":"▶ Reproducir"}</div>
            {on&&<input type="range" min={0} max={100} value={Math.round(volumes[s.id]*100)} onChange={e=>{e.stopPropagation();onVolume(s.id,e.target.value/100);}} onClick={e=>e.stopPropagation()} style={{width:"100%",marginTop:10,cursor:"pointer"}}/>}
          </div>
        );})}
      </div>
      <div style={{marginTop:14,backgroundColor:C.surface,borderRadius:12,padding:"10px 14px",border:`1px solid ${C.border}`,textAlign:"center"}}>
        <div style={{fontSize:12,color:C.muted}}>Puedes combinar varios sonidos a la vez</div>
      </div>
    </div>
  );
}

// ─── APP ───────────────────────────────────────────────────────────────────────
function App() {
  const [setup,setSetup]       = useState(null);
  const [ready,setReady]       = useState(false);
  const [entries,setEntries]   = useState([]);
  const [tab,setTab]           = useState("registro");
  const [modal,setModal]       = useState(false);
  const [finalEntry,setFinal]  = useState(null);
  const [showSala,setShowSala] = useState(false);
  const [showImport,setShowImport] = useState(false);
  const [lightColor,setLC]     = useState(LIGHT_COLORS[0]);
  const [brightness,setBr]     = useState(0.65);
  const [lightActive,setLA]    = useState(false);
  const [playing,setPlaying]   = useState({});
  const [volumes,setVolumes]   = useState(SOUNDS.reduce((a,s)=>({...a,[s.id]:0.7}),{}));
  const audioRef  = useRef(null);
  const unsubRef  = useRef(null);

  useEffect(()=>{
    audioRef.current = new AudioEngine();
    const saved = loadSetup();
    if(saved){ setSetup(saved); initWith(saved); }
    else setReady(true);
    return ()=>{ audioRef.current?.destroy(); unsubRef.current?.(); };
  },[]);

  const initWith = useCallback(s => {
    if(s.mode==="local"){ setEntries(loadLocal()); setReady(true); }
    else {
      unsubRef.current?.();
      const unsub = salaRef(s.roomCode).onSnapshot(snap=>{
        if(snap.exists) setEntries(snap.data().entries||[]);
        setReady(true);
      },()=>setReady(true));
      unsubRef.current = unsub;
    }
  },[]);

  const handleSetupDone = s => { setSetup(s); initWith(s); };

  const persist = useCallback(async ne => {
    setEntries(ne);
    if(setup?.mode==="local") saveLocal(ne);
    else if(setup?.mode==="sala") await pushEntries(setup.roomCode, ne);
  },[setup]);

  const addEntry    = e  => persist([{...e,id:Date.now(),createdAt:new Date().toISOString()},...entries]);
  const delEntry    = id => persist(entries.filter(e=>e.id!==id));
  const updateEntry = (id,upd) => persist(entries.map(e=>e.id===id?{...e,...upd}:e));
  const handleImport= imported => { const ids=new Set(entries.map(e=>e.id)); persist([...imported.filter(e=>!ids.has(e.id)),...entries]); };

  const toggleSound = id => {
    const eng=audioRef.current; if(!eng)return;
    if(playing[id]){eng.stop(id);setPlaying(p=>{const n={...p};delete n[id];return n;});}
    else{eng.play(id,volumes[id]);setPlaying(p=>({...p,[id]:true}));}
  };
  const setVol=(id,v)=>{setVolumes(p=>({...p,[id]:v}));if(playing[id])audioRef.current?.setVol(id,v);};

  const handleLeaveSala = () => {
    unsubRef.current?.(); localStorage.removeItem(LS_SETUP); saveLocal([]);
    setSetup(null); setEntries([]); setShowSala(false); setReady(false);
    setTimeout(()=>setReady(true),50);
  };

  if(!ready) return (
    <div style={{minHeight:"100vh",backgroundColor:C.bg,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16,fontFamily:"'Nunito',system-ui,sans-serif"}}>
      <span style={{fontSize:48}}>🌙</span><span className="spin" style={{fontSize:24}}>⏳</span>
    </div>
  );

  if(!setup) return <SetupScreen onDone={handleSetupDone}/>;

  const isSala = setup.mode==="sala";

  return (
    <div style={{minHeight:"100vh",backgroundColor:C.bg,color:C.text,fontFamily:"'Nunito',system-ui,sans-serif",display:"flex",flexDirection:"column"}}>
      <style>{`@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.45;transform:scale(0.8)}}`}</style>

      <div style={{padding:"calc(env(safe-area-inset-top,0px) + 14px) 16px 10px",borderBottom:`1px solid ${C.border}`,backgroundColor:C.bg,flexShrink:0,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          <span style={{fontSize:24}}>🌙</span>
          <div>
            <div style={{fontSize:20,fontWeight:900,letterSpacing:-0.5}}>Lunita</div>
            <div style={{fontSize:11,color:C.muted}}>{isSala?`Sala de ${setup.babyName}`:"Modo local"}</div>
          </div>
        </div>
        {isSala&&(
          <button onClick={()=>setShowSala(true)} style={{border:`1px solid ${C.border}`,backgroundColor:C.surface,borderRadius:10,padding:"6px 12px",color:C.accent,fontSize:12,fontWeight:800,cursor:"pointer",fontFamily:"inherit"}}>
            👨‍👩‍👧 {setup.roomCode}
          </button>
        )}
      </div>

      <div style={{flex:1,overflowY:"auto",paddingBottom:72}}>
        {tab==="registro"&&<RegistroView entries={entries} onDelete={delEntry} onFinalize={setFinal} onExport={()=>exportJSON(entries,setup.babyName)} onImport={()=>setShowImport(true)}/>}
        {tab==="linterna"&&<LinternaView color={lightColor} setColor={setLC} brightness={brightness} setBrightness={setBr} active={lightActive} setActive={setLA}/>}
        {tab==="sonidos" &&<SonidosView  playing={playing} volumes={volumes} onToggle={toggleSound} onVolume={setVol}/>}
      </div>

      {tab==="registro"&&(
        <button onClick={()=>setModal(true)} style={{position:"fixed",bottom:80,right:18,width:54,height:54,borderRadius:27,backgroundColor:C.accent,border:"none",cursor:"pointer",fontSize:28,display:"flex",alignItems:"center",justifyContent:"center",boxShadow:`0 4px 20px ${hexA(C.accent,0.45)}`,zIndex:50,color:"#080b14",fontWeight:900,fontFamily:"inherit"}}>＋</button>
      )}

      <div style={{position:"fixed",bottom:0,left:0,right:0,backgroundColor:C.surface,borderTop:`1px solid ${C.border}`,display:"flex",paddingBottom:"env(safe-area-inset-bottom,0px)"}}>
        {[{id:"registro",label:"Registro",emoji:"📋"},{id:"linterna",label:"Linterna",emoji:"💡"},{id:"sonidos",label:"Sonidos",emoji:"🎵"}].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,padding:"10px 0 12px",border:"none",background:"none",cursor:"pointer",fontFamily:"inherit"}}>
            <span style={{fontSize:22,filter:tab===t.id?"none":"grayscale(1) opacity(0.45)"}}>{t.emoji}</span>
            <span style={{fontSize:10,fontWeight:800,color:tab===t.id?C.accent:C.muted}}>{t.label}</span>
          </button>
        ))}
      </div>

      {modal      &&<AddEntryModal onSave={addEntry}  onClose={()=>setModal(false)}/>}
      {finalEntry &&<FinalizeModal entry={finalEntry} onUpdate={updateEntry} onClose={()=>setFinal(null)}/>}
      {showSala   &&<SalaInfoModal setup={setup} onClose={()=>setShowSala(false)} onLeave={handleLeaveSala}/>}
      {showImport &&<ImportModal onImport={handleImport} onClose={()=>setShowImport(false)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
